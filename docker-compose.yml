services:
  app:
    build: .
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker,${BENCHMARK_CASE:-reader-offset}
    ports:
      - "8080:8080"
    networks:
      - benchmark

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: benchmark
      MYSQL_USER: bench
      MYSQL_PASSWORD: bench
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - benchmark

  prometheus:
    image: prom/prometheus:v3.3.1
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - benchmark

  grafana:
    image: grafana/grafana:12.0.1
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    networks:
      - benchmark

volumes:
  mysqldata:

networks:
  benchmark:
    driver: bridge
